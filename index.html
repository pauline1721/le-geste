<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Le Geste</title>

<style>

body{
    margin:0;
    background:#efe3cf;
    font-family:Georgia, serif;
}

.page{
    max-width:700px;
    margin:auto;
    padding:25px 20px 40px;
    box-sizing:border-box;
}

.image-container{
    position:relative;
    width:100%;
}

.image{
    width:100%;
    display:block;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo{
    position:absolute;

    top:38px;
    left:50%;
    transform:translateX(-50%);

    width:105px;
    z-index:100;
}

</style>

</head>

<body>

<div class="page">

    <div class="image-container">

        <img class="image"
             src="image_geste.png"
             alt="Le Geste UNIS">

        <img class="logo"
             src="logoUNIS_transparent.png"
             alt="Logo UNIS">

    </div>

</div>

</body>

</html>
