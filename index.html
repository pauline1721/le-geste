<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>UNIS — Le Geste</title>

<style>
body{
    margin:0;
    background:#efe3cf;
    font-family:Georgia, serif;
}

.page{
    max-width:700px;
    margin:auto;
    padding:25px 20px 40px;
    box-sizing:border-box;
}

.image-container{
    position:relative;
    width:100%;
}

.image{
    width:100%;
    display:block;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.logo-zone{
    position:absolute;
    top:20.4%;
    left:50%;
    transform:translate(-50%,-50%);
    width:18%;
    max-width:125px;
    min-width:75px;
    z-index:100;
}

.logo{
    width:100%;
    display:block;
    cursor:pointer;
    animation:respire 4s ease-in-out infinite;
    filter:drop-shadow(0 0 8px rgba(180,130,40,.35));
}

.logo-zone.active .logo{
    animation:clicLogo .45s ease;
}

.halo{
    position:absolute;
    inset:-18%;
    border-radius:50%;
    background:radial-gradient(circle, rgba(218,170,70,.55), rgba(218,170,70,0) 65%);
    opacity:0;
    pointer-events:none;
}

.logo-zone.active .halo{
    animation:halo .9s ease-out;
}

.star{
position:absolute;
color:#d8a13b;
font-size:14px;
opacity:0;
pointer-events:none;
text-shadow:0 0 10px rgba(216,161,59,.9);
}

.star.s1{ top:5%; left:10%; }
.star.s2{ top:2%; left:42%; }
.star.s3{ top:7%; right:8%; }
.star.s4{ top:28%; left:0%; }
.star.s5{ top:30%; right:0%; }
.star.s6{ bottom:20%; left:5%; }
.star.s7{ bottom:18%; right:5%; }
.star.s8{ bottom:0%; left:30%; }
.star.s9{ bottom:2%; right:30%; }
.star.s10{ top:48%; left:-8%; }
.star.s11{ top:50%; right:-8%; }
.star.s12{ bottom:-8%; left:50%; }

.logo-zone.active .star{
animation:etoile 1.2s ease-out;
}

.logo-zone.active .s1{ animation-delay:0s; }
.logo-zone.active .s2{ animation-delay:.05s; }
.logo-zone.active .s3{ animation-delay:.1s; }
.logo-zone.active .s4{ animation-delay:.15s; }
.logo-zone.active .s5{ animation-delay:.2s; }
.logo-zone.active .s6{ animation-delay:.25s; }
.logo-zone.active .s7{ animation-delay:.3s; }
.logo-zone.active .s8{ animation-delay:.35s; }
.logo-zone.active .s9{ animation-delay:.4s; }
.logo-zone.active .s10{ animation-delay:.45s; }
.logo-zone.active .s11{ animation-delay:.5s; }
.logo-zone.active .s12{ animation-delay:.55s; }

@keyframes etoile{
0%{
opacity:0;
transform:translate(0,0) scale(.4) rotate(0deg);
}

35%{
opacity:1;
}

100%{
opacity:0;
transform:translate(var(--x), var(--y)) scale(1.4) rotate(180deg);
}
}

.s1{ --x:-22px; --y:-28px; }
.s2{ --x:0px; --y:-34px; }
.s3{ --x:24px; --y:-26px; }
.s4{ --x:-30px; --y:-4px; }
.s5{ --x:30px; --y:-4px; }
.s6{ --x:-24px; --y:22px; }
.s7{ --x:24px; --y:22px; }
.s8{ --x:-8px; --y:32px; }
.s9{ --x:10px; --y:32px; }
.s10{ --x:-34px; --y:8px; }
.s11{ --x:34px; --y:8px; }
.s12{ --x:0px; --y:38px; }
@keyframes respire{
    0%{ transform:scale(1); }
    50%{ transform:scale(1.045); }
    100%{ transform:scale(1); }
}

@keyframes clicLogo{
    0%{ transform:scale(1); }
    35%{ transform:scale(.92); }
    70%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
}

@keyframes halo{
    0%{ opacity:0; transform:scale(.7); }
    35%{ opacity:1; transform:scale(1); }
    100%{ opacity:0; transform:scale(1.45); }
}

@keyframes spark1{
    0%{ opacity:0; transform:translate(0,0) scale(.5); }
    40%{ opacity:1; }
    100%{ opacity:0; transform:translate(-18px,-24px) scale(1.2); }
}

@keyframes spark2{
    0%{ opacity:0; transform:translate(0,0) scale(.5); }
    40%{ opacity:1; }
    100%{ opacity:0; transform:translate(20px,-22px) scale(1.2); }
}

@keyframes spark3{
    0%{ opacity:0; transform:translate(0,0) scale(.5); }
    40%{ opacity:1; }
    100%{ opacity:0; transform:translate(-20px,22px) scale(1.2); }
}

@keyframes spark4{
    0%{ opacity:0; transform:translate(0,0) scale(.5); }
    40%{ opacity:1; }
    100%{ opacity:0; transform:translate(18px,24px) scale(1.2); }
}
</style>
</head>

<body>

<div class="page">
    <div class="image-container">

        <img class="image"
             src="image_geste.png"
             alt="Le Geste UNIS">

        <div class="logo-zone" onclick="jouerCarillon()">
            <div class="halo"></div>

            <img class="logo"
                 src="logoUNIS-transparent.png"
                 alt="Logo UNIS">

            <span class="star s1">✦</span>
<span class="star s2">✧</span>
<span class="star s3">✦</span>
<span class="star s4">✧</span>
<span class="star s5">✦</span>
<span class="star s6">✧</span>
<span class="star s7">✦</span>
<span class="star s8">✧</span>
<span class="star s9">✦</span>
<span class="star s10">✧</span>
<span class="star s11">✦</span>
<span class="star s12">✧</span>
        </div>

        <audio id="carillon" preload="auto">
            <source src="carillon.m4a" type="audio/mp4">
        </audio>

    </div>
</div>

<script>
function jouerCarillon(){
    const zone = document.querySelector(".logo-zone");
    const son = document.getElementById("carillon");

    zone.classList.remove("active");
    void zone.offsetWidth;
    zone.classList.add("active");

    son.currentTime = 0;
    son.play().catch(function(){});
}
</script>

</body>
</html>
